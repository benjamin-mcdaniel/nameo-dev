name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'backend/worker/**'
      - 'backend/search-worker/**'
      - 'wrangler.toml'
      - 'config/**'
  workflow_dispatch:

jobs:
  deploy-main-worker:
    name: Deploy nameo-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: backend/worker

      - name: Deploy nameo-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-search-worker:
    name: Deploy nameo-search-worker
    runs-on: ubuntu-latest
    needs: deploy-main-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy search worker
        run: npx wrangler deploy
        working-directory: backend/search-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
